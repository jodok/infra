#cloud-config

# update and upgrade packages on first boot, install packages required for bootstrapping
# install salt-minion from official SaltStack repository
# clone infra repository if not already present
# preserve an existing FQDN, otherwise append the batlogg.com domain

users:
  - name: admin
    primary_group: admin
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  jodok@batlogg.com

package_reboot_if_required: false
package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - gpg

write_files:
  - path: /etc/salt/minion
    permissions: "0644"
    content: |
      file_client: local
      file_roots:
        base:
          - /srv/infra/salt
      pillar_roots:
        base:
          - /srv/infra/pillar
      decrypt_pillar:
        - "secrets:vault"
  - path: /var/lib/cloud/scripts/per-instance/bootstrap-infra.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      current_hostname=$(hostname)
      if [[ "$current_hostname" == *.* ]]; then
        fqdn="$current_hostname"
      else
        short_name=$(hostname -s)
        fqdn="${short_name}.batlogg.com"
      fi
      hostnamectl set-hostname "$fqdn"

      mkdir -p /etc/apt/keyrings
      curl -fsSL https://packages.broadcom.com/artifactory/api/security/keypair/SaltProjectKey/public \
        | tee /etc/apt/keyrings/salt-archive-keyring.pgp >/dev/null
      curl -fsSL https://github.com/saltstack/salt-install-guide/releases/latest/download/salt.sources \
        | tee /etc/apt/sources.list.d/salt.sources >/dev/null

      apt update
      apt install -y salt-minion

      install -d -o admin -g admin /srv/infra
      if [ ! -d /srv/infra/.git ]; then
        su - admin -c 'git clone https://github.com/jodok/infra /srv/infra'
      fi

      echo "$(hostname -f)" > /etc/salt/minion_id
